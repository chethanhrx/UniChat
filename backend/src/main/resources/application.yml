server:
  port: 8080

spring:
  application:
    name: unichat-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:file:./data/unichat_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

unichat:
  security:
    jwt-secret: "UniChatSuperSecretKeyForJwtAuthenticationMustBeLongEnough256Bits!"
    jwt-expiration-ms: 86400000 # 24 hours
    encryption-key: "UniChatSecretKeyForAes256GcmVault" # 32 chars for 256-bit AES
